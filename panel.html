<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Sensei</title>
  <link rel="stylesheet" href="panel.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header">
    <div class="logo">
      <img src="icon128.png" alt="Code Ninjas Logo" id="cn-logo" onerror="this.onerror=null; this.src=''; this.alt='🥷';">
      Virtual Sensei
    </div>
    <div class="header-actions" style="display: flex; gap: 8px;">
      <button id="resolve-btn" class="icon-btn hidden" title="I got help from a Sensei!">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"></path>
        </svg>
      </button>
      <button id="refresh-btn" class="icon-btn" title="Clear Chat History">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
          <polyline points="21 3 21 8 16 8"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <div id="chat-container">
    <div class="message sensei">
      Hey Ninja! 🥷 I'm your Virtual Sensei. Tell me what you're working on, and we'll figure it out together!
    </div>
  </div>

  <div class="input-area">
    <div id="quick-starters" class="quick-starters hidden">
      <button class="starter-chip">🕹️ How do I add a sprite?</button>
      <button class="starter-chip">🔁 What is a loop?</button>
      <button class="starter-chip">🐞 Help me find a bug!</button>
    </div>
    <div class="controls" id="input-controls">
      <textarea id="prompt-input" placeholder="Ask the Virtual Sensei a question..." rows="1"></textarea>
      <button id="send-btn" class="action-btn primary" title="Ask Sensei">
        Ask
      </button>
    </div>
    <div id="boost-prompt" class="hidden" style="text-align: center; color: var(--ink); font-weight: 800; padding: 10px;">
      Wait for your Sensei! 🥷✨
    </div>
  </div>

  <div id="clear-modal" class="modal hidden">
    <div class="modal-content">
      <h3 style="margin-top: 0; margin-bottom: 8px;">Clear Chat?</h3>
      <p style="margin-top: 0; margin-bottom: 20px; font-size: 0.95rem; color: var(--muted);">Are you sure you want to clear the Virtual Sensei chat session? This cannot be undone.</p>
      <div class="modal-actions" style="display: flex; gap: 10px; justify-content: flex-end;">
        <button id="modal-cancel-btn" class="action-btn" style="background: var(--border); color: var(--ink);">Cancel</button>
        <button id="modal-confirm-btn" class="action-btn primary" style="background: #ef4444;">Clear</button>
      </div>
    </div>
  </div>



  <script type="module" src="panel.js"></script>
</body>
</html>
